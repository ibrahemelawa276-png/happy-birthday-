<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة ليكِ! ✨</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            text-align: center;
        }

        /* أنيميشن الوردة اللي بتفتح */
        .flower-container {
            margin-bottom: 30px;
            font-size: 5rem;
            animation: bloom 3s ease-in-out forwards;
            display: inline-block;
        }

        @keyframes bloom {
            0% { transform: scale(0.3); filter: grayscale(100%); }
            40% { transform: scale(0.6); filter: grayscale(50%); }
            100% { transform: scale(1.2); filter: grayscale(0%); }
        }

        /* الجواب والمغلف */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        .envelope {
            position: relative;
            width: 280px;
            height: 180px;
            background: #ff477e;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.5s;
        }

        /* غطاء الجواب */
        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-top: 100px solid #ff758f;
            transform-origin: top;
            transition: transform 0.5s 0.3s;
            z-index: 3;
        }

        /* شكل الجواب لما يفتح */
        .envelope.open::before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        /* ورقة الرسالة اللي جوه */
        .letter {
            position: absolute;
            bottom: 5px;
            left: 15px;
            width: 250px;
            height: 160px;
            background: white;
            border-radius: 5px;
            padding: 15px;
            box-sizing: border-box;
            transition: transform 0.5s;
            z-index: 2;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            transform: translateY(0);
            opacity: 0;
            overflow: hidden;
        }

        .envelope.open .letter {
            transform: translateY(-110px);
            height: auto;
            min-height: 200px;
            opacity: 1;
            z-index: 4;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
        }

        .letter h2 {
            font-size: 1.1rem;
            color: #ff477e;
            margin: 0 0 8px 0;
        }

        .letter p {
            font-size: 0.9rem;
            color: #4a4a4a;
            line-height: 1.4;
            margin: 0;
        }

        /* الزرار */
        .open-btn {
            background-color: #ff0054;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 84, 0.3);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .open-btn:hover {
            background-color: #ff477e;
            transform: scale(1.05);
        }

        .open-btn:disabled {
            background-color: #cccccc;
            box-shadow: none;
            cursor: default;
        }

        /* قلوب متساقطة */
        .heart {
            position: absolute;
            color: #ff477e;
            animation: floatUp 4s linear infinite;
            top: 100%;
        }

        @keyframes floatUp {
            to {
                transform: translateY(-105vh) translateX(50px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- الوردة اللي بتفتح تلقائي أول ما الصفحة تحمل -->
    <div class="flower-container" id="flower">🌹</div>

    <!-- منطقة الجواب -->
    <div class="envelope-wrapper">
        <div class="envelope" id="envelope">
            <div class="letter">
                <h2>كل سنة وأنتِ طيبة يا غالية! 🎂✨</h2>
                <p>اليوم ده مش عيد ميلادك أنتِ وبس، ده عيد ميلاد الأيام الحلوة اللي جمعتني بيكِ. ربنا يديمك في حياتي يا سندي وسري وفرحتي الكبيرة. بتمنالك سنة كلها نجاح وفرحة شبه قلبك! 💗</p>
            </div>
        </div>
    </div>

    <!-- الزرار اللي بيفتح الجواب -->
    <button class="open-btn" id="openBtn" onclick="openLetter()">اضغطي هنا لفتح الجواب 💌</button>

    <script>
        // أنيميشن تفتيح الوردة بالايموجي (من برعم لوردة متفتحة)
        const flower = document.getElementById('flower');
        const stages = ['🌱', '🌿', '🌷', '🌹', '✨🌹✨'];
        let stage = 0;

        const bloomInterval = setInterval(() => {
            if (stage < stages.length) {
                flower.innerText = stages[stage];
                stage++;
            } else {
                clearInterval(bloomInterval);
            }
        }, 600);

        // دالة فتح الجواب عند الضغط على الزرار
        function openLetter() {
            const envelope = document.getElementById('envelope');
            const btn = document.getElementById('openBtn');
            
            envelope.classList.add('open');
            btn.innerText = 'عيد ميلاد سعيد! 🎉';
            btn.disabled = true; // بيعطل الزرار بعد ما يضغط خلاص

            // تشغيل تأثير القلوب المتساقطة أول ما الجواب يفتح
            setInterval(createHeart, 300);
        }

        // صناعة القلوب الطايرة
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerText = Math.random() > 0.5 ? '❤️' : '💖';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            heart.style.fontSize = (Math.random() * 1 + 1) + 'rem';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4000);
        }
    </script>

</body>
</html>
