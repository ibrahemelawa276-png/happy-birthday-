<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد سعيد! 🌸</title>
    <style>
        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* حاوية الوردة الكبيرة */
        .flower-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 40px;
            animation: float 3s ease-in-out infinite;
        }

        /* قلب الوردة */
        .flower-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: #ffe600;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 0 0 15px rgba(255, 230, 0, 0.6);
        }

        /* أوراق الوردة */
        .petal {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 90px;
            background: #ff4d6d;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transform-origin: bottom center;
            margin-left: -30px;
            margin-top: -90px;
            opacity: 0.95;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        /* توزيع الأوراق بشكل دائري */
        .petal:nth-child(1) { transform: rotate(0deg); }
        .petal:nth-child(2) { transform: rotate(45deg); background: #ff758f; }
        .petal:nth-child(3) { transform: rotate(90deg); }
        .petal:nth-child(4) { transform: rotate(135deg); background: #ff758f; }
        .petal:nth-child(5) { transform: rotate(180deg); }
        .petal:nth-child(6) { transform: rotate(225deg); background: #ff758f; }
        .petal:nth-child(7) { transform: rotate(270deg); }
        .petal:nth-child(8) { transform: rotate(315deg); background: #ff758f; }

        /* فرع الورقة الأخضر */
        .stem {
            position: absolute;
            top: 150px;
            left: 50%;
            width: 8px;
            height: 100px;
            background: #2d6a4f;
            transform: translateX(-50%);
            z-index: -1;
            border-radius: 4px;
        }

        /* كارت الكلام الحلو */
        .card {
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            backdrop-filter: blur(10px);
            border: 2px solid #fff;
        }

        h1 {
            color: #c71585;
            font-size: 2.5rem;
            margin-top: 0;
            margin-bottom: 15px;
        }

        p {
            color: #4a4a4a;
            font-size: 1.3rem;
            line-height: 1.8;
            margin: 10px 0;
        }

        .highlight {
            color: #ff4d6d;
            font-weight: bold;
        }

        /* حركة خفيفة للوردة */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }
    </style>
</head>
<body>

    <!-- الوردة الكبيرة -->
    <div class="flower-container">
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="flower-center"></div>
        <div class="stem"></div>
    </div>

    <!-- كارت المعايدة -->
    <div class="card">
        <h1>كل سنة وأنت طيب! 🎉🎂</h1>
        <p>في يوم ميلادك، حبيت أهديك <span class="highlight">أجمل وردة</span> بتكبر وتنور بوجودك في حياتنا.</p>
        <p>كل عام وأنت مصدر النور والبهجة لكل اللي حواليك، أتمنى لك سنة جديدة مليانة فرحة، ونجاح، وراحة بال، وتحقق فيها كل اللي بتتمنّاه وأكتر.</p>
        <p class="highlight" style="font-size: 1.5rem; margin-top: 20px;">🌸 عيد ميلاد سعيد يا غالي 🌸</p>
    </div>

</body>
</html>
