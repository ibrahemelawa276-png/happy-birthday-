<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة خاصة ✨</title>
    <style>
        /* خلفية ثابتة وهادية تماماً بدون أي حركة */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f7ebeb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow: hidden;
        }

        /* ===== أنيميشن الوردة بالـ CSS ===== */
        .flower-container {
            position: relative;
            width: 100px;
            height: 150px;
            margin-bottom: 40px;
        }

        /* الساق */
        .stem {
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: 4px;
            height: 80px;
            background-color: #3b7a57;
            border-radius: 2px;
        }

        /* الورقة الخضراء على الساق */
        .leaf {
            position: absolute;
            top: 40px;
            left: 52%;
            width: 20px;
            height: 12px;
            background-color: #3b7a57;
            border-radius: 0 10px 0 10px;
            transform-origin: left center;
            transform: rotate(20deg) scale(0);
            animation: growLeaf 1.5s 1.5s ease-forward forwards;
        }

        /* برعم الوردة والأوراق الحمراء */
        .rose {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            width: 40px;
            height: 40px;
            transform-origin: bottom center;
            animation: bloomRose 2s 0.5s ease-out forwards;
        }

        .petal {
            position: absolute;
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, #ff2a6d, #b50036);
            border-radius: 50% 50% 0 50%;
            transform-origin: bottom right;
        }

        .petal.p1 { transform: rotate(0deg); }
        .petal.p2 { transform: rotate(45deg); border-radius: 50% 50% 50% 0; transform-origin: bottom left; }
        .petal.p3 { transform: rotate(90deg); opacity: 0.9; }
        .petal.p4 { transform: rotate(135deg); opacity: 0.8; }

        /* حركات أنيميشن الوردة */
        @keyframes bloomRose {
            0% { transform: translateX(-50%) scale(0) rotate(0deg); }
            60% { transform: translateX(-50%) scale(1.2) rotate(-10deg); }
            100% { transform: translateX(-50%) scale(1) rotate(0deg); }
        }

        @keyframes growLeaf {
            to { transform: rotate(20deg) scale(1); }
        }


        /* ===== الجواب والمغلف (بدون أي اهتزاز) ===== */
        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 180px;
            margin-bottom: 30px;
        }

        .envelope {
            position: absolute;
            bottom: 0;
            width: 300px;
            height: 180px;
            background: #e63946;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            z-index: 2;
        }

        /* غطاء الجواب */
        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid #f1515e;
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 3;
        }

        /* فتح الغطاء */
        .envelope.open::before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        /* ورقة الرسالة البيضاء بالداخل */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 20px;
            width: 260px;
            height: 150px;
            background: #ffffff;
            border-radius: 4px;
            padding: 15px;
            box-sizing: border-box;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
            opacity: 0;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        /* خروج الرسالة لأعلى بنعومة */
        .envelope.open .letter {
            transform: translateY(-120px);
            height: auto;
            min-height: 180px;
            opacity: 1;
            z-index: 4;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }

        .letter h2 {
            font-size: 1.1rem;
            color: #e63946;
            margin: 0 0 10px 0;
        }

        .letter p {
            font-size: 0.95rem;
            color: #4a4a4a;
            line-height: 1.5;
            margin: 0;
        }

        /* الزرار السفلي */
        .open-btn {
            background-color: #e63946;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
            z-index: 10;
        }

        .open-btn:hover {
            background-color: #b50036;
        }

        .open-btn:disabled {
            background-color: #b0b0b0;
            cursor: default;
        }
    </style>
</head>
<body>

    <!-- الوردة المرسومة بالـ CSS كاملة -->
    <div class="flower-container">
        <div class="rose">
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
        </div>
        <div class="stem">
            <div class="leaf"></div>
        </div>
    </div>

    <!-- الجواب -->
    <div class="envelope-wrapper">
        <div class="envelope" id="envelope">
            <div class="letter">
                <h2>كل سنة وأنتِ طيبة يا غالية! 🎂✨</h2>
                <p>اليوم ده مش عيد ميلادك أنتِ وبس، ده عيد ميلاد الأيام الحلوة اللي جمعتني بيكِ. ربنا يديمك في حياتي يا سندي وسري وفرحتي الكبيرة. بتمنالك سنة كلها نجاح وفرحة شبه قلبك! 💗</p>
            </div>
        </div>
    </div>

    <!-- الزرار المباشر -->
    <button class="open-btn" id="openBtn" onclick="openLetter()">اضغطي هنا لفتح الجواب 💌</button>

    <script>
        function openLetter() {
            const envelope = document.getElementById('envelope');
            const btn = document.getElementById('openBtn');
            
            // فتح الجواب ورفع الرسالة
            envelope.classList.add('open');
            
            // تغيير نص الزرار وتعطيله بعد الضغط
            btn.innerText = 'عيد ميلاد سعيد! 🎉';
            btn.disabled = true;
        }
    </script>

</body>
</html>
